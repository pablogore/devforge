# Generated by DevForge
# Adjust linters according to your team's standards.

version: "2"

run:
  timeout: 5m
  concurrency: 4
  issues-exit-code: 2
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - revive
    - gocyclo
    - gosec
    - misspell
    - whitespace

# Optional linters:
#   - errcheck
#   - ineffassign
#   - dupl
#   - prealloc

settings:
  gocyclo:
    min-complexity: 15
  gosec:
    excludes:
      - G115
  misspell:
    locale: US
    ignore-rules:
      - cancelled
      - behaviour

exclusions:
  generated: lax
  presets:
    - comments
    - common-false-positives
    - legacy
    - std-error-handling
  rules:
    - linters:
        - revive
      path: _test.go
      text: context.Context should be the first parameter of a function
    - linters:
        - revive
      path: _test\.go
      text: exported func.*returns unexported type.*which can be annoying to use
    - linters:
        - gosec
      path: _test\.go
      text: Potential hardcoded credentials
  paths:
    - mocks
    - third_party$
    - builtin$
    - examples/.*
    - _test.go$

formatters:
  enable:
    - gofmt
    - goimports
