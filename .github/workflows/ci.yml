name: CI

on:
  pull_request:
  push:
    branches: [develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      GOPRIVATE: github.com/devforge/*

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.DEVFORGE_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
          | sh -s -- -b /usr/local/bin latest

      - name: Build forge
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build \
            -ldflags "-s -w -X main.version=dev -X main.commit=$(git rev-parse --short HEAD)" \
            -o forge \
            ./cmd/forge

      - name: Run DevForge
        run: ./forge pr --mode full