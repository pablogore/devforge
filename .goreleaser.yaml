version: 2

project_name: devforge

builds:
  - id: forge
    main: ./cmd/forge
    binary: forge
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

    ignore:
      - goos: windows
        goarch: arm64

    env:
      - CGO_ENABLED=0

    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}

archives:
  - id: default
    format: binary
    builds:
      - forge
    # GoReleaser adds .exe for Windows automatically; do not duplicate in template
    name_template: "forge-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999

dockers:
  - image_templates:
      - "ghcr.io/devforge/devforge:{{ .Version }}"
      - "ghcr.io/devforge/devforge:latest"
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64

release:
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"