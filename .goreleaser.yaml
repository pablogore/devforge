version: 2

project_name: devforge

builds:
  - id: forge
    main: ./cmd/forge
    binary: forge
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

    ignore:
      - goos: windows
        goarch: arm64

    env:
      - CGO_ENABLED=0

    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}

archives:
  - id: default
    format: binary
    builds:
      - forge
    # GoReleaser adds .exe for Windows automatically; do not duplicate in template
    name_template: "forge-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999

# Image name uses GITHUB_REPOSITORY (owner/name) so the default token can push to GHCR.
# org.opencontainers.image.source links the package to the repo so GITHUB_TOKEN can push.
# See: https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#labelling-container-images
dockers:
  - image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:{{ .Version }}"
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:latest"
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_REPOSITORY }}"

release:
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"